name: tdnf CI

on:
  - pull_request
  - push
  - workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            librpm-dev \
            libsolv-dev \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libssl-dev \
            libsqlite3-dev \
            libgpgme-dev \
            libpopt-dev \
            pkg-config

      - name: Install Zig 0.16
        run: |
          ZIG_VERSION=0.16.0
          arch=$(uname -m)
          case "${arch}" in
            x86_64)  zig_arch=x86_64 ;;
            aarch64) zig_arch=aarch64 ;;
            *) echo "unsupported arch: ${arch}"; exit 1 ;;
          esac
          tar=zig-linux-${zig_arch}-${ZIG_VERSION}.tar.xz
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/${tar}"
          sudo tar -C /opt -xJf "${tar}"
          sudo ln -sfn "/opt/zig-linux-${zig_arch}-${ZIG_VERSION}/zig" /usr/local/bin/zig
          zig version

      - name: Build
        run: zig build install --prefix ./out

      - name: Smoke test
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version
          file ./out/lib/libtdnf.so.4.0.0
          file ./out/lib/tdnf-plugins/libtdnfmetalink.so
          file ./out/lib/tdnf-plugins/libtdnfrepogpgcheck.so

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install flake8
      - run: flake8 pytests

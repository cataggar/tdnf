name: tdnf CI

on: [pull_request, push, workflow_dispatch]

jobs:
    docker-build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                dist: [photon, fedora]
        env:
            DIST: ${{ matrix.dist }}
        steps:
            - uses: actions/checkout@v3

            - name: Build container images
              run: |
                  docker build -t ${DIST}/tdnf-build -f ci/Dockerfile.${DIST} .

            - name: Save Docker images
              run: |
                  docker save ${DIST}/tdnf-build | gzip > ${DIST}-tdnf-build.tar.gz

            - name: Upload saved images
              uses: actions/upload-artifact@v4
              with:
                  name: docker-image-${{ matrix.dist }}
                  path: ${{ matrix.dist }}-tdnf-build.tar.gz

    load-images-and-test:
        runs-on: ubuntu-latest
        needs: docker-build
        strategy:
            matrix:
                dist: [photon, fedora]
        env:
            DIST: ${{ matrix.dist }}
        steps:
            - uses: actions/checkout@v3

            - name: Download image artifact
              uses: actions/download-artifact@v4
              with:
                  name: docker-image-${{ matrix.dist }}

            - name: Load Docker image
              run: |
                  gunzip -c ${{ matrix.dist }}-tdnf-build.tar.gz | docker load

            - name: Run container with tests
              run: |
                  docker run --privileged --security-opt seccomp:unconfined --rm \
                      -e DIST \
                      -v "$(pwd)":/build \
                      -w /build \
                      "${DIST}/tdnf-build" \
                      ./ci/docker-entrypoint.sh

    llvm-tests:
        runs-on: ubuntu-latest
        needs: docker-build
        strategy:
            matrix:
                dist: [photon, fedora]
        env:
            DIST: ${{ matrix.dist }}
        steps:
            - uses: actions/checkout@v3

            - name: Download image artifact
              uses: actions/download-artifact@v4
              with:
                  name: docker-image-${{ matrix.dist }}

            - name: Load Docker image
              run: |
                  gunzip -c ${{ matrix.dist }}-tdnf-build.tar.gz | docker load

            - name: Run LLVM tests
              run: |
                  docker run --privileged --security-opt seccomp:unconfined --rm \
                      -e DIST \
                      -v "$(pwd)":/build \
                      -w /build \
                      "${DIST}/tdnf-build" \
                      ./ci/llvm-tdnf-build.sh

    build-tdnf-rpms:
        runs-on: ubuntu-latest
        needs: docker-build
        env:
            DIST: photon
        steps:
            - uses: actions/checkout@v3

            - name: Download image artifact
              uses: actions/download-artifact@v4
              with:
                  name: docker-image-photon

            - name: Load Docker image
              run: |
                  gunzip -c photon-tdnf-build.tar.gz | docker load

            - name: Build RPMs in container
              run: |
                  docker run --rm \
                      -e DIST \
                      -v "$(pwd)":/build \
                      -w /build \
                      photon/tdnf-build \
                      ./ci/build-rpms.sh

            - name: Run pytests package
              run: |
                  docker run --rm \
                      -v "$(pwd)/rpms":/rpms \
                      photon \
                      /bin/bash -c 'tdnf -y --repofrompath=tdnf,/rpms --nogpgcheck install tdnf-pytests && pytest /usr/share/tdnf/pytests/'

            - name: Upload RPMs
              uses: actions/upload-artifact@v4
              with:
                  name: tdnf-rpms
                  path: rpms

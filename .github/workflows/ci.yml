name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            gcc \
            gnupg \
            libgpgme-dev \
            pkg-config \
            rpm

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Configure Zig caches
        uses: ./.github/actions/zig-cache

      - name: Build (Debug)
        run: zig build install --prefix ./out

      - name: Smoke test (Debug)
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version
          sudo ./scripts/smoke-rpmzig.sh ./out

      - name: Zig unit tests
        run: zig build test --prefix ./out

      - name: Build (ReleaseSafe)
        run: |
          rm -rf out
          zig build -Doptimize=ReleaseSafe install --prefix ./out

      - name: Smoke test (ReleaseSafe)
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version
          sudo ./scripts/smoke-rpmzig.sh ./out

      - name: Public ABI audit
        run: |
          zig build -Doptimize=ReleaseSafe abi-audit --prefix ./out
          zig build migration-audit --prefix ./out

      - name: Native dependency and public API audits
        run: |
          zig build -Doptimize=ReleaseSafe native-dependency-audit --prefix ./out
          zig build -Doptimize=ReleaseSafe public-api-audit --prefix ./out

  no-rpm-development:
    name: Build without RPM development files
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install minimal build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            flake8 \
            gcc \
            libgpgme-dev \
            pkg-config
          legacy_dev="lib$(printf 'r%sm' 'p')-dev"
          if dpkg-query -W -f='${Status}' "${legacy_dev}" 2>/dev/null |
              grep -Fq 'install ok installed'; then
            echo "::error::legacy development files must not be installed"
            exit 1
          fi
          legacy_module="$(printf 'r%sm' 'p')"
          if pkg-config --exists "${legacy_module}"; then
            echo "::error::legacy package metadata must not be visible"
            exit 1
          fi

      - name: Install host RPM test oracle
        run: sudo apt-get install -y --no-install-recommends rpm

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Configure Zig caches
        uses: ./.github/actions/zig-cache

      - name: Build, test, and lint
        run: |
          zig build -Doptimize=ReleaseSafe install --prefix ./out
          zig build test --prefix ./out
          zig build lint --prefix ./out
          zig build -Doptimize=ReleaseSafe install --prefix ./out

      - name: Audit ABI, migration, dependencies, and public API
        run: |
          zig build migration-audit --prefix ./out
          zig build -Doptimize=ReleaseSafe abi-audit --prefix ./out
          zig build -Doptimize=ReleaseSafe native-dependency-audit --prefix ./out
          zig build -Doptimize=ReleaseSafe public-api-audit --prefix ./out

  lint:
    name: Source policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: C-to-Zig migration audit
        run: python3 scripts/c-to-zig-audit.py
      - name: Native dependency source audit
        run: python3 scripts/librpm-audit.py
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 pytests

  # Summary job matching a stable required-status-check name for branch
  # protection.
  ci-summary:
    name: CI
    runs-on: ubuntu-24.04
    needs: [build-and-test, no-rpm-development, lint]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs['build-and-test'].result }}" != "success" ] || \
             [ "${{ needs['no-rpm-development'].result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"

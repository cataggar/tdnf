name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: ubuntu-22.04-arm
            name: linux-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            librpm-dev \
            libsolv-dev \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libssl-dev \
            libsqlite3-dev \
            libgpgme-dev \
            libpopt-dev \
            pkg-config

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Configure Zig caches
        uses: ./.github/actions/zig-cache

      - name: Build (Debug)
        run: zig build install --prefix ./out

      - name: Smoke test (Debug)
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version
          file ./out/lib/libtdnf.so.4.0.0
          file ./out/lib/tdnf-plugins/libtdnfmetalink.so
          file ./out/lib/tdnf-plugins/libtdnfrepogpgcheck.so

      - name: Build (ReleaseSafe)
        run: |
          rm -rf out
          zig build -Doptimize=ReleaseSafe install --prefix ./out

      - name: Smoke test (ReleaseSafe)
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version

  lint:
    name: flake8
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 pytests

  # Summary job matching a stable required-status-check name for branch
  # protection.
  ci-summary:
    name: CI
    runs-on: ubuntu-22.04
    needs: [build-and-test, lint]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"

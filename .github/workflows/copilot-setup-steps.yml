name: "Copilot Setup Steps"

# Pre-provisions the Copilot cloud agent's ephemeral dev environment.
# Keeping this in sync with .github/workflows/ci.yml lets the agent
# reproduce CI locally before it opens a PR.
#
# Trigger the workflow when the setup file itself changes so the
# config can be validated like any other workflow change.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Name must be exactly `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            librpm-dev \
            libsolv-dev \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libssl-dev \
            libsqlite3-dev \
            libgpgme-dev \
            libpopt-dev \
            pkg-config \
            flake8

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Configure Zig caches
        uses: ./.github/actions/zig-cache

      - name: Cache Zig global cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.ZIG_GLOBAL_CACHE_DIR }}
          key: zig-cache-${{ runner.os }}-0.16.0-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-0.16.0-

      - name: Warm build (Debug + ReleaseSafe)
        continue-on-error: true
        run: |
          zig build install --prefix ./out
          rm -rf out zig-out
          zig build -Doptimize=ReleaseSafe install --prefix ./out

      - name: Smoke test
        continue-on-error: true
        run: |
          LD_LIBRARY_PATH=./out/lib ./out/bin/tdnf --version

      - name: Lint smoke test
        continue-on-error: true
        run: flake8 pytests
